<div class="container">
  <div class="jumbotron">
    <div class="row">
      <div class="col-md-6">
        <h1>@lark.js/mvc (keyed)</h1>
      </div>
      <div class="col-md-6">
        <div class="row">
          <div class="col-sm-6 smallpad">
            <button type="button" class="btn btn-primary btn-block" id="run" mx-click="run()">Create 1,000 rows</button>
          </div>
          <div class="col-sm-6 smallpad">
            <button type="button" class="btn btn-primary btn-block" id="runlots" mx-click="runlots()">
              Create 10,000 rows
            </button>
          </div>
          <div class="col-sm-6 smallpad">
            <button type="button" class="btn btn-primary btn-block" id="add" mx-click="add()">Append 1,000 rows</button>
          </div>
          <div class="col-sm-6 smallpad">
            <button type="button" class="btn btn-primary btn-block" id="update" mx-click="update()">
              Update every 10th row
            </button>
          </div>
          <div class="col-sm-6 smallpad">
            <button type="button" class="btn btn-primary btn-block" id="clear" mx-click="clear()">Clear</button>
          </div>
          <div class="col-sm-6 smallpad">
            <button type="button" class="btn btn-primary btn-block" id="swaprows" mx-click="swaprows()">
              Swap Rows
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
  <table class="table table-hover table-striped test-data">
    <tbody id="tbody">
      {{forOf data as item idx}}
      <tr id="row-{{=item.id}}" class="{{if selected===item.id}}danger{{/if}}">
        <td class="col-md-1">{{=item.id}}</td>
        <td class="col-md-4"><a data-action="select" data-id="{{=item.id}}">{{=item.label}}</a></td>
        <td class="col-md-1">
          <a data-action="remove" data-id="{{=item.id}}"
            ><span class="glyphicon glyphicon-remove" aria-hidden="true"></span
          ></a>
        </td>
        <td class="col-md-6"></td>
      </tr>
      {{/forOf}}
    </tbody>
  </table>
  <span class="preloadicon glyphicon glyphicon-remove" aria-hidden="true"></span>
</div>
