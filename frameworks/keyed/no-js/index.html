<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>No.JS-"keyed"</title>
  <link href="/css/currentStyle.css" rel="stylesheet" />
</head>
<body>
<script src="src/no.js"></script>
<script src="src/main.js"></script>

<div id="main" state='{"rows": [], "sel": 0}'>
  <div class="container">
    <div class="jumbotron">
      <div class="row">
        <div class="col-md-6">
          <h1>No.JS-"keyed"</h1>
        </div>
        <div class="col-md-6">
          <div class="row">
            <div class="col-sm-6 smallpad">
              <button type="button" class="btn btn-primary btn-block" id="run" on:click="rows = $build(1000); sel = 0">Create 1,000 rows</button>
            </div>
            <div class="col-sm-6 smallpad">
              <button type="button" class="btn btn-primary btn-block" id="runlots" on:click="rows = $build(10000); sel = 0">Create 10,000 rows</button>
            </div>
            <div class="col-sm-6 smallpad">
              <button type="button" class="btn btn-primary btn-block" id="add" on:click="rows = rows.concat($build(1000))">Append 1,000 rows</button>
            </div>
            <div class="col-sm-6 smallpad">
              <button type="button" class="btn btn-primary btn-block" id="update" on:click="rows = $upd(rows)">Update every 10th row</button>
            </div>
            <div class="col-sm-6 smallpad">
              <button type="button" class="btn btn-primary btn-block" id="clear" on:click="rows = []; sel = 0">Clear</button>
            </div>
            <div class="col-sm-6 smallpad">
              <button type="button" class="btn btn-primary btn-block" id="swaprows" on:click="rows = $swp(rows)">Swap Rows</button>
            </div>
          </div>
        </div>
      </div>
    </div>
    <table class="table table-hover table-striped test-data">
      <tbody>
        <tr each="row in rows" key="row.id" class-danger="row.id === sel">
          <td class="col-md-1" bind="row.id"></td>
          <td class="col-md-4">
            <a on:click="sel = row.id" bind="row.label"></a>
          </td>
          <td class="col-md-1">
            <a on:click="rows = rows.filter(r => r.id !== row.id)">
              <span class="glyphicon glyphicon-remove" aria-hidden="true"></span>
            </a>
          </td>
          <td class="col-md-6"></td>
        </tr>
      </tbody>
    </table>
    <span class="preloadicon glyphicon glyphicon-remove" aria-hidden="true"></span>
  </div>
</div>
</body>
</html>
